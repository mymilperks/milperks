    function ProfileSetup({ onComplete }) {
      const [step, setStep] = useState(0);

        { q:stateQ, field:"state", isSelect:true },
      ];
      const cur = steps[step];
      const pick = (val) => {
        const up = {...p,[cur.field]:val};
        setP(up);
        if (step < steps.length-1) setTimeout(()=>setStep(step+1),250);
      };
      return (

                      {featured.map(b=>(
                        <div key={b.id} onClick={()=>setExpanded(expanded===b.id?null:b.id)} style={{background:"#0d1a2d",border:`1px solid ${expanded===b.id?"#00b4d8":"#132033"}`,borderRadius:"12px",padding:"13px",cursor:"pointer"}}>
                          <div style={{fontSize:"10px",color:CCOLORS[b.cat]||"#00b4d8",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"5px"}}>{b.cat}</div>
                          <div style={{fontSize:"13px",fontWeight:600,marginBottom:"7px",lineHeight:1.3}}>{b.title}</div>
                          <div style={{display:"inline-block",padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,background:"rgba(52,211,153,0.1)",color:"#34d399",border:"1px solid rgba(52,211,153,0.15)"}}>{b.value}</div>
                          {expanded===b.id&&<div style={{marginTop:"10px",fontSize:"12px",color:"#64748b",lineHeight:1.6}}>{b.desc}{b.link&&<a href={b.link} target="_blank" rel="noopener noreferrer" style={{display:"block",marginTop:"8px",color:"#00b4d8",fontSize:"12px"}}>Learn More</a>}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <input placeholder="Search benefits..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"11px",background:"#0d1a2d",border:"1px solid #132033",borderRadius:"10px",color:"#e2e8f0",fontSize:"14px",outline:"none",marginBottom:"10px",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:"7px",overflowX:"auto",marginBottom:"8px",paddingBottom:"2px"}}>
                  {STATUSES.map(s=><button key={s} onClick={()=>setSelStatus(s)} style={pill(selStatus===s)}>{s}</button>)}
                </div>
                <div style={{display:"flex",gap:"7px",overflowX:"auto",marginBottom:"14px",paddingBottom:"2px"}}>
                  {CATS.map(c=><button key={c} onClick={()=>setSelCat(c)} style={pill(selCat===c)}>{c}</button>)}
                </div>
                <div style={{fontSize:"11px",color:"#1e3a5f",marginBottom:"10px"}}>{filteredB.length} benefit{filteredB.length!==1?"s":""} {viewSaved?"saved":"found"}</div>
                {filteredB.map(b=>{
                  const isExp=expanded===b.id;
                  return (
                    <div key={b.id} onClick={()=>setExpanded(isExp?null:b.id)} style={{background:"#0d1a2d",border:`1px solid ${isExp?"#00b4d8":"#132033"}`,borderRadius:"12px",marginBottom:"8px",cursor:"pointer"}}>
                      <div style={{padding:"13px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"10px",color:CCOLORS[b.cat]||"#00b4d8",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}}>{b.cat}</div>
                            <div style={{fontSize:"14px",fontWeight:600,marginBottom:"6px",lineHeight:1.3}}>{b.title}</div>
                            <div style={{display:"inline-block",padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,background:"rgba(52,211,153,0.1)",color:"#34d399",border:"1px solid rgba(52,211,153,0.15)"}}>{b.value}</div>
                          </div>
                          <button onClick={e=>{e.stopPropagation();setSaved(prev=>prev.includes(b.id)?prev.filter(x=>x!==b.id):[...prev,b.id]);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:saved.includes(b.id)?"#00b4d8":"#334155",fontWeight:600,whiteSpace:"nowrap"}}>
                            {saved.includes(b.id)?"Saved":"Save"}
                          </button>
                        </div>
                        <div style={{display:"flex",gap:"5px",marginTop:"7px",flexWrap:"wrap"}}>
                          {b.status.map(s=><span key={s} style={{fontSize:"9px",padding:"1px 5px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",color:"#334155",border:"1px solid #0d1e30",textTransform:"uppercase"}}>{s==="active"?"Active":s==="reserve"?"Guard/Res":"Vet"}</span>)}
                        </div>
                      </div>
                      {isExp&&(
                        <div style={{padding:"0 13px 13px",borderTop:"1px solid #0d1e30",paddingTop:"11px"}}>
                          <p style={{fontSize:"13px",color:"#64748b",lineHeight:1.7,margin:0}}>{b.desc}</p>
                          {b.link&&<a href={b.link} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-block",marginTop:"10px",padding:"7px 14px",background:"rgba(0,180,216,0.08)",color:"#00b4d8",border:"1px solid rgba(0,180,216,0.2)",borderRadius:"7px",fontSize:"12px",textDecoration:"none"}}>Visit Official Site</a>}
                        </div>
                      )}
                    </div>
                  );
                })}
                {filteredB.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#334155"}}>No benefits match your filters.</div>}
              </>
            )}

            {tab==="states"&&(
              <>
                <div style={{fontSize:"13px",color:"#475569",marginBottom:"14px",lineHeight:1.7}}>State-specific Guard and Reserve benefits including tuition waivers, tax exemptions, and property tax relief.</div>
                <select value={selState} onChange={e=>setSelState(e.target.value)} style={{width:"100%",padding:"13px",background:"#0d1a2d",border:"1px solid #132033",borderRadius:"10px",color:"#e2e8f0",fontSize:"14px",outline:"none",marginBottom:"14px",boxSizing:"border-box"}}>
                  {SKEYS.map(k=><option key={k} value={k}>{STATE_BENEFITS[k].name}</option>)}
                </select>
                {sd&&(
                  <div style={{background:"#0d1a2d",border:"1px solid #132033",borderRadius:"14px",padding:"18px"}}>
                    <div style={{fontSize:"20px",fontWeight:900,color:"#00b4d8",letterSpacing:"1px",marginBottom:"14px"}}>{sd.name.toUpperCase()}</div>
                    {[{label:"Education and Tuition",text:sd.tuition,color:"#a78bfa"},{label:"Tax Benefits",text:sd.tax,color:"#fbbf24"},{label:"Other Benefits",text:sd.other,color:"#34d399"}].map(sec=>(
                      <div key={sec.label} style={{marginBottom:"14px",paddingBottom:"14px",borderBottom:"1px solid #0d1e30"}}>
                        <div style={{fontSize:"10px",fontWeight:700,color:sec.color,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"7px"}}>{sec.label}</div>
                        <p style={{fontSize:"13px",color:"#64748b",lineHeight:1.7,margin:0}}>{sec.text}</p>
                      </div>
                    ))}
                    <a href={"https://myarmybenefits.us.army.mil/Benefit-Library/State/Territory-Benefits/"+sd.name.replace(/ /g,"-")} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"8px 14px",background:"rgba(0,180,216,0.08)",color:"#00b4d8",border:"1px solid rgba(0,180,216,0.2)",borderRadius:"7px",fontSize:"12px",textDecoration:"none"}}>
                      Full State Benefits Guide
                    </a>
                  </div>
                )}
                <div style={{marginTop:"14px",background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:"10px",padding:"14px"}}>
                  <div style={{fontSize:"10px",color:"#fbbf24",fontWeight:700,marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Guard and Reserve Note</div>
                  <p style={{fontSize:"12px",color:"#475569",lineHeight:1.7,margin:0}}>State benefits require in-state residency and active drilling status. Always verify current eligibility with your unit Education Officer or State G1. Federal benefits layer on top - maximize both.</p>
                </div>
              </>
            )}

            {tab==="scholarships"&&(
              <>
                <div style={{fontSize:"13px",color:"#475569",marginBottom:"14px",lineHeight:1.7}}>Federal, nonprofit, corporate, and university scholarships for service members, Guard/Reserve, veterans, and families.</div>
                <input placeholder="Search scholarships..." value={scholSearch} onChange={e=>setScholSearch(e.target.value)} style={{width:"100%",padding:"11px",background:"#0d1a2d",border:"1px solid #132033",borderRadius:"10px",color:"#e2e8f0",fontSize:"14px",outline:"none",marginBottom:"10px",boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:"7px",overflowX:"auto",marginBottom:"14px",paddingBottom:"2px"}}>
                  {STYPES.map(t=><button key={t} onClick={()=>setScholType(t)} style={pill(scholType===t)}>{t}</button>)}
                </div>
                <div style={{fontSize:"11px",color:"#1e3a5f",marginBottom:"10px"}}>{filteredS.length} scholarship{filteredS.length!==1?"s":""} found</div>
                {filteredS.map(s=>{
                  const tc={Federal:"#22d3ee",Nonprofit:"#34d399",Private:"#fb923c",Corporate:"#c084fc",University:"#fbbf24"}[s.type]||"#64748b";
                  return (
                    <div key={s.id} style={{background:"#0d1a2d",border:"1px solid #132033",borderRadius:"12px",padding:"16px",marginBottom:"10px"}}>
                      <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"6px",flexWrap:"wrap"}}>
                        <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"4px",background:tc+"18",color:tc,border:"1px solid "+tc+"25",fontWeight:700,textTransform:"uppercase"}}>{s.type}</span>
                        <span style={{fontSize:"11px",color:"#334155"}}>{s.org}</span>
                      </div>
                      <div style={{fontSize:"14px",fontWeight:600,marginBottom:"6px",lineHeight:1.3}}>{s.title}</div>
                      <div style={{display:"inline-block",padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,background:"rgba(52,211,153,0.1)",color:"#34d399",border:"1px solid rgba(52,211,153,0.15)",marginBottom:"10px"}}>{s.amount}</div>
                      <p style={{fontSize:"12px",color:"#475569",lineHeight:1.7,margin:"0 0 8px 0"}}>{s.desc}</p>
                      <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"8px"}}>
                        {s.eligible.map(e=><span key={e} style={{fontSize:"9px",padding:"1px 5px",borderRadius:"3px",background:"rgba(255,255,255,0.03)",color:"#334155",border:"1px solid #0d1e30",textTransform:"uppercase"}}>{e==="active"?"Active":e==="reserve"?"Guard/Res":"Vet"}</span>)}
                      </div>
                      {s.link&&<a href={s.link} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"7px 14px",background:"rgba(0,180,216,0.08)",color:"#00b4d8",border:"1px solid rgba(0,180,216,0.2)",borderRadius:"7px",fontSize:"12px",textDecoration:"none"}}>Apply / Learn More</a>}
                    </div>
                  );
                })}
              </>
            )}
          </div>

          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#08111f",borderTop:"1px solid #0d1e30",padding:"10px 14px",display:"flex",gap:"10px"}}>
            <button onClick={()=>setShowCalc(true)} style={{flex:1,padding:"11px",background:"rgba(0,180,216,0.08)",border:"1px solid rgba(0,180,216,0.2)",borderRadius:"9px",color:"#00b4d8",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>
              My Value Calculator
            </button>
            <button onClick={()=>setShowSubmit(true)} style={{flex:1,padding:"11px",background:"rgba(52,211,153,0.08)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:"9px",color:"#34d399",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>
              Submit a Benefit
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
