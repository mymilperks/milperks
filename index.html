{id:138,title:"Disney+ 25% Off Military",cat:"Subscriptions",status:["active","reserve","veteran"],desc:"Disney+ offers 25% off annual plans through the Exchange. Best for military families who deploy frequently due to the offline download feature. Includes Disney, Marvel, Star Wars, and National Geographic.",link:"https://www.shopmyexchange.com",value:"25% off annual plan",v:24},
{id:139,title:"Samsung 30% Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Samsung offers 30% off phones, tablets, TVs, and home appliances for military members. Verify through SheerID at samsung.com/us/shop/discount-program. One of the best tech discounts available.",link:"https://www.samsung.com/us/shop/discount-program",value:"30% off",v:300},
{id:140,title:"The North Face 50% Off — Pro Program",cat:"Retail",status:["active","reserve","veteran"],desc:"The North Face offers 50% off through their Pro Account program via GovX. One of the highest outdoor gear discounts available for military members — applies to jackets, boots, backpacks, and more.",link:"https://www.thenorthface.com/en-us/help/pro-purchase-program",value:"50% off",v:200},
{id:141,title:"Ariat 10% Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Ariat offers 10% off boots, western wear, and workwear for all military purchases online, brand stores, and official outlets. Verify through SheerID at ariat.com.",link:"https://www.ariat.com/military-discount",value:"10% off",v:50},
{id:142,title:"Alpha Industries 15% Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Alpha Industries — makers of the authentic MA-1 flight jacket — offer 15% off for active, retired, and reserve military members. Verify through SheerID at alphaindustries.com.",link:"https://www.alphaindustries.com/alpha-military-discount",value:"15% off",v:60},
{id:143,title:"Honda Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Honda offers $500 off a new vehicle purchase for eligible military members, retirees, veterans, and their families. One of the most accessible manufacturer military discount programs.",link:"https://www.honda.com/military",value:"$500 off",v:500},
{id:144,title:"Ford Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Ford offers a cash reward on new Ford and Lincoln vehicle purchases for military members. Amount varies by zip code and model. One of the most widely available manufacturer military programs.",link:"https://www.ford.com/military",value:"Cash reward",v:500},
{id:145,title:"Hyundai Jeep Mazda $500 Military Bonus",cat:"Retail",status:["active","reserve","veteran"],desc:"Hyundai, Jeep, and Mazda each offer $500 bonus cash on new vehicle purchases for active duty and veterans. Stack with dealer incentives for maximum savings.",link:"https://www.hyundaiusa.com/us/en/military-bonus",value:"$500 off",v:500},
{id:146,title:"Pep Boys Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"Pep Boys offers 10% off daily on parts and services plus 50% off oil changes every Wednesday for military members and veterans. One of the best recurring auto service discounts available.",link:"https://www.pepboys.com",value:"10% off + 50% Wed oil change",v:100},

{id:148,title:"Caesars Hotels 30% Military Discount",cat:"Travel",status:["active","reserve","veteran"],desc:"Caesars Hotels and Casinos offer a year-round discount of up to 30% for veterans at any US Caesars property. Verify through ID.me at check-in. Includes Caesars Palace, Harrah's, Paris Las Vegas, and more.",link:"https://www.caesars.com",value:"Up to 30% off",v:300},
{id:149,title:"Beaches Resorts 10% Military Discount",cat:"Travel",status:["active","reserve","veteran"],desc:"Beaches Resorts offers an additional 10% off for all military members year-round, on top of any existing promotions. One of the best family resort discounts available.",link:"https://www.beaches.com",value:"10% off",v:200},
{id:150,title:"American Forces Travel — MWR Portal",cat:"Travel",status:["active","reserve","veteran"],desc:"Official DoD-backed travel portal for flights, hotels, car rentals, cruises, and vacation packages. Powered by Priceline and exclusively for military, Guard, Reserve, Coast Guard, retirees, and eligible MWR patrons.",link:"https://www.americanforcestravel.com",ft:true,value:"Exclusive military rates",v:500},
{id:151,title:"SIXT Car Rental Military Discount",cat:"Travel",status:["active","reserve","veteran"],desc:"SIXT offers a verified military discount on car rentals worldwide. Complete the verification form on the SIXT website to unlock the discount on your next booking.",link:"https://www.sixt.com/rental-services/military-car-rental/",value:"Discounted rates",v:100},
{id:152,title:"Oakley Up to 50% Off — Military",cat:"Retail",status:["active","reserve","veteran"],desc:"Oakley offers up to 50% off eyewear, sunglasses, goggles, and apparel for veterans and active duty. Available through the VA official discount program and GovX. One of the best eyewear discounts available.",link:"https://www.oakley.com/en-us/military",value:"Up to 50% off",v:150},
{id:153,title:"Take 5 Oil Change 25% Off",cat:"Retail",status:["active","reserve","veteran"],desc:"Take 5 Oil Change offers 25% off oil changes for military members and veterans at all locations. One of the best and most accessible auto service discounts — no appointment needed.",link:"https://www.take5oilchange.com",value:"25% off",v:50},

{id:155,title:"My Medic 25% Off Military",cat:"Healthcare",status:["active","reserve","veteran"],desc:"My Medic offers 25% off first aid kits, medical packs, and emergency supplies for all current and former military members. Verify through GovX to receive your promo code.",link:"https://www.mymedic.com",value:"25% off",v:50},
{id:156,title:"Vacations for Warriors",cat:"Recreation",status:["veteran"],desc:"Nonprofit providing free vacations for combat-injured soldiers funded by donated airline miles, hotel points, and timeshare options. Supported by American Airlines and major hotel programs.",link:"https://www.vacationsforwarriors.org",value:"Free vacations",v:2000},
{id:157,title:"O'Reilly Auto Parts 10% Military Discount",cat:"Retail",status:["active","reserve","veteran"],desc:"O'Reilly Auto Parts offers 10% off regularly priced in-store items for military members and veterans. Show military ID at the register — no app or online verification needed.",link:"https://www.oreillyauto.com",value:"10% off",v:40},
{id:86,title:"Federal Veterans Hiring Preference",cat:"Employment",status:["veteran","active"],desc:"Veterans receive 5 or 10 point preference added to their score on federal job applications. Veterans with a 10%+ service-connected disability are placed at the top of the candidate list above all other applicants. Applies to most competitive federal jobs across all agencies. Search jobs at USAJOBS.gov.",link:"https://www.usajobs.gov",ft:true,value:"Priority federal hiring",v:5000},
{id:87,title:"Veterans Recruitment Appointment (VRA)",cat:"Employment",status:["veteran"],desc:"VRA allows federal agencies to hire eligible veterans directly into jobs up to GS-11 level without competition. No need to go through the normal competitive hiring process. Eligible if you served on active duty and were honorably discharged, are a disabled veteran, served on active duty during a war or campaign, or received an Armed Forces Service Medal.",link:"https://www.opm.gov/policy-data-oversight/hiring-information/hiring-authorities/",value:"Non-competitive federal hiring",v:3000},
{id:88,title:"30% or More Disabled Veteran Hiring",cat:"Employment",status:["veteran"],desc:"Federal agencies can hire veterans with a service-connected disability rating of 30% or more directly without competition. This is a permanent appointment — not temporary. One of the most powerful non-competitive hiring tools available to disabled veterans.",link:"https://www.opm.gov/policy-data-oversight/hiring-information/hiring-authorities/",value:"Direct federal appointment",v:3000},
{id:89,title:"USAJOBS — Federal Job Search Portal",cat:"Employment",status:["active","reserve","veteran"],desc:"The official federal government job search portal. Create a profile, upload your resume, and apply to thousands of federal positions across every agency. Veterans preference is automatically factored in when you mark your eligibility. Start here for any federal job search.",link:"https://www.usajobs.gov",value:"Free — thousands of federal jobs",v:2000},
{id:90,title:"FedsHireVets — Veteran Federal Career Resources",cat:"Employment",status:["veteran","active"],desc:"OPM's official resource for veterans transitioning to federal careers. Includes step-by-step guides on how to use veterans preference, apply through USAJOBS, translate military experience, and navigate federal hiring authorities.",link:"https://www.fedshirevets.gov",value:"Free career transition tools",v:500},
{id:91,title:"Military Spouse Hiring Preference — Federal Jobs",cat:"Employment",status:["active","reserve"],desc:"Military spouses of active duty service members on PCS orders, spouses of 100% disabled veterans, and surviving spouses of service members killed on active duty qualify for non-competitive hiring into federal jobs. Apply through USAJOBS and attach PCS orders and marriage certificate. Similar to veterans preference but for spouses.",link:"https://www.usajobs.gov",value:"Non-competitive federal hiring",v:3000},
{id:92,title:"Military Spouse Employment Partnership (MSEP)",cat:"Employment",status:["active","reserve"],desc:"DoD program connecting military spouses with 500+ employer partners committed to hiring them including Amazon, USAA, Hilton, Booz Allen Hamilton, and more. Create a free profile on the MSEP portal to access exclusive job listings from partner companies.",link:"https://myseco.militaryonesource.mil/portal/",value:"500+ hiring partners",v:2000},
{id:93,title:"SECO — Spouse Education and Career Opportunities",cat:"Employment",status:["active","reserve"],desc:"Free DoD career coaching, resume help, job search tools, and licensing reimbursement for military spouses. Includes one-on-one career counseling at no cost. Available through Military OneSource.",link:"https://myseco.militaryonesource.mil",value:"Free career coaching",v:1000},
{id:94,title:"Hire Heroes USA — Free Veteran Job Placement",cat:"Employment",status:["veteran","active","reserve"],desc:"Nonprofit providing free resume writing, interview coaching, and job placement services to veterans and military spouses. Has helped over 100,000 veterans find jobs. Completely free — no catch.",link:"https://www.hireheroesusa.org",value:"Free job placement",v:1500},
{id:95,title:"American Corporate Partners (ACP) Mentorship",cat:"Employment",status:["veteran","reserve"],desc:"Free one-year mentorship program matching veterans with senior professionals at top companies including JPMorgan, Bank of America, Deloitte, and Google. Focused on career transition, networking, and professional development.",link:"https://www.acp-usa.org",value:"Free mentorship program",v:1000},
{id:96,title:"Warrior-Scholar Project",cat:"Employment",status:["veteran","active"],desc:"Free 1-2 week academic boot camps at Harvard, Yale, UChicago, Michigan, and more — specifically for enlisted veterans transitioning to college and professional careers. Covers academic writing, critical thinking, and networking.",link:"https://warrior-scholar.org",value:"Free academic prep program",v:500},
{id:97,title:"DoD SkillBridge Program",cat:"Employment",status:["active"],desc:"Active duty service members within 180 days of separation can work full-time at a civilian company — while still receiving full military pay and benefits. Companies like Amazon, Google, USAA, and thousands more participate. One of the most valuable transition tools available.",link:"https://skillbridge.osd.mil",ft:true,value:"Full pay while interning civilian",v:8000},
{id:98,title:"Transition Assistance Program (TAP)",cat:"Employment",status:["active"],desc:"Mandatory DoD program for separating service members. Includes career workshops, resume writing, interview skills, VA benefits briefing, and job fair access. Take it seriously — most veterans wish they had paid more attention to TAP.",link:"https://www.tapevents.org",value:"Free transition support",v:1000},
{id:99,title:"Savings Deposit Program (SDP)",cat:"Finance",status:["active"],desc:"One of the most powerful deployed benefits. While serving in a combat zone, deposit up to $10,000 and earn a guaranteed 10% annual return — completely risk-free. That's 10x better than any savings account. Interest continues accruing for 90 days after returning from deployment.",link:"https://myarmybenefits.us.army.mil",ft:true,value:"Guaranteed 10% return",v:1000},
{id:100,title:"MilTax — Free Military Tax Filing",cat:"Finance",status:["active","reserve","veteran"],desc:"DoD's free tax software built specifically for military. Handles combat zone exclusions, multi-state PCS moves, TSP contributions, and BAH/BAS correctly. Far better than TurboTax for military taxes. Available through Military OneSource.",link:"https://www.militaryonesource.mil/financial-legal/tax-resource-center/miltax-military-tax-services/",ft:true,value:"Free — saves $100-200/yr",v:150},
{id:101,title:"Citi Premier $0 Annual Fee (MLA)",cat:"Credit Cards",status:["active","reserve"],desc:"Citi waives the $95 annual fee on the Citi Premier card for active duty military under MLA. Includes 3x points on restaurants, supermarkets, gas, air travel, and hotels.",link:"https://www.citi.com/credit-cards/citi-premier-credit-card",value:"Saves $95/yr",v:95},
{id:102,title:"Citi Prestige $0 Annual Fee (MLA)",cat:"Credit Cards",status:["active","reserve"],desc:"Citi waives the $495 annual fee on the Citi Prestige card for active duty military under MLA. Includes 4th night free on hotel stays, airport lounge access, and strong travel rewards.",link:"https://www.citi.com",value:"Saves $495/yr",v:495},
{id:103,title:"Hilton Honors Amex Aspire $0 Fee",cat:"Credit Cards",status:["active","reserve"],desc:"Amex waives the $550 annual fee on the Hilton Honors Aspire card for active duty under MLA/SCRA. Includes automatic Hilton Diamond status, $250 resort credit, $250 airline fee credit, and a free weekend night reward annually.",link:"https://www.americanexpress.com/us/credit-cards/card/hilton-honors-american-express-aspire-card/",value:"Saves $550/yr",v:550},
{id:104,title:"Marriott Bonvoy Brilliant $0 Fee",cat:"Credit Cards",status:["active","reserve"],desc:"Amex waives the $650 annual fee for active duty under MLA/SCRA. Includes automatic Marriott Platinum Elite status, $300 dining credit, and a free night award annually.",link:"https://www.americanexpress.com/us/credit-cards/card/marriott-bonvoy-brilliant/",value:"Saves $650/yr",v:650},
{id:105,title:"Delta SkyMiles Reserve $0 Fee",cat:"Credit Cards",status:["active","reserve"],desc:"Amex waives the $650 annual fee on the Delta SkyMiles Reserve for active duty under MLA. Includes Delta Sky Club lounge access, companion certificate, and upgrade priority on Delta flights.",link:"https://www.americanexpress.com/us/credit-cards/card/delta-skymiles-reserve-american-express-card/",value:"Saves $650/yr",v:650},
{id:106,title:"Military Commissary — Grocery Savings",cat:"Recreation",status:["active","reserve","veteran"],desc:"On-base commissaries offer groceries at cost plus a small surcharge — typically 20-30% below civilian grocery prices. Retirees and 100% disabled veterans have lifetime access. Significant savings for families over time.",link:"https://www.commissaries.com",value:"20-30% off groceries",v:1500},
{id:107,title:"Military Exchange (PX/BX/NEX) Tax-Free Shopping",cat:"Retail",status:["active","reserve","veteran"],desc:"Tax-free shopping at on-base exchanges on electronics, clothing, appliances, and more. All honorably discharged veterans now have permanent online shopping access at shopmyexchange.com with no sales tax.",link:"https://www.shopmyexchange.com",ft:true,value:"Tax-free + discounted prices",v:800},
{id:108,title:"BRS Continuation Pay Bonus",cat:"Finance",status:["active","reserve"],desc:"Under the Blended Retirement System, service members who commit to additional years at the mid-career point receive a lump-sum Continuation Pay — typically 2.5x monthly basic pay for active duty and 0.5x for Reserve. Often overlooked during mid-career decisions.",link:"https://militarypay.defense.gov/Benefits/Retirement/",value:"2.5x monthly pay bonus",v:5000},
{id:109,title:"VA Dental Insurance Program (VADIP)",cat:"Healthcare",status:["veteran"],desc:"Veterans not eligible for VA dental care can enroll in VADIP — affordable private dental and vision coverage specifically negotiated for veterans. Providers include Delta Dental and MetLife at group rates.",link:"https://www.va.gov/health-care/about-va-health-benefits/dental-care/dental-insurance/",value:"Affordable dental + vision",v:600},
{id:110,title:"OCONUS COLA — Cost of Living Allowance",cat:"Finance",status:["active"],desc:"Service members stationed OCONUS receive an Overseas Cost of Living Allowance (OCONUS COLA) to offset higher costs of living abroad. Amount varies by duty station and dependent status. Not taxable income. Check your LES to confirm you're receiving the correct amount.",link:"https://www.travel.dod.mil/Allowances/Overseas-COLA/",value:"Non-taxable monthly allowance",v:3000},
{id:111,title:"Overseas Housing Allowance (OHA)",cat:"Finance",status:["active"],desc:"Service members stationed OCONUS who live off-post receive OHA to cover rent, utilities, and move-in costs. Based on local rental market surveys. Significantly higher than BAH in many OCONUS locations. If you're living in government quarters, you receive MIHA instead.",link:"https://www.travel.dod.mil/Allowances/Overseas-Housing-Allowance/",value:"Full rent coverage",v:15000},
{id:112,title:"SOFA — Status of Forces Agreement Protections",cat:"Finance",status:["active"],desc:"Service members stationed in SOFA countries (Japan, Germany, South Korea, etc.) are exempt from host nation income taxes on US military pay and most purchases at military facilities. Also provides legal protections if involved in incidents while on duty.",link:"https://www.defense.gov",value:"Tax exemptions abroad",v:2000},
{id:113,title:"Military Star Card — Exchange Credit Card",cat:"Finance",status:["active","reserve","veteran"],desc:"Low-interest credit card exclusively for military members and veterans. 10.24% APR — far below commercial cards. No annual fee. Works at all military exchanges worldwide including OCONUS locations. Rewards program included.",link:"https://www.myexchange.com/star-card",value:"10.24% APR, no annual fee",v:300},
{id:114,title:"Space-A from OCONUS Duty Stations",cat:"Travel",status:["active","reserve","veteran"],desc:"OCONUS Space-A flights are often the most valuable — flights from Ramstein, Yokota, Osan, Camp Humphreys, and other OCONUS bases can take you to the continental US, Hawaii, or other international destinations for near-zero cost. Active duty on leave gets Category II priority.",link:"https://www.amc.af.mil/AMC-Travel-Site/",value:"Near-free international flights",v:2000},

window.locUseGeo = function(){
  set({locLoading:true, locError:"", locResults:[]});
  if(!navigator.geolocation){
    set({locLoading:false, locError:"Geolocation not supported on this device."});
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat = pos.coords.latitude.toFixed(4);
      const lng = pos.coords.longitude.toFixed(4);
      set({locGeo:{lat,lng}, locLoading:false,
        locCity:`Near you (${lat}, ${lng})`});
    },
    function(err){
      set({locLoading:false,
        locError:"Location access denied. Enter your city below."});
    },
    {timeout:8000}
  );
};

window.locSetCity = function(){
  const v = document.getElementById('loc-city-input');
  if(v && v.value.trim()){
    set({locCity: v.value.trim(), locGeo: null, locResults:[]});
  }
};

window.locPickCat = function(catId){
  set({locCat: catId, locResults:[], locError:""});
  if(S.locCity || S.locGeo) locSearch(catId);
};

function locSearch(catId){
  const cat = LOC_CATS.find(c=>c.id===catId);
  if(!cat) return;
  const loc = S.locGeo
    ? `${S.locGeo.lat},${S.locGeo.lng}`
    : encodeURIComponent(S.locCity);
  const query = encodeURIComponent(cat.q + " near " + (S.locCity || "my location"));
  // Build Google Maps search URL
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(cat.q)}/@${S.locGeo ? S.locGeo.lat+","+S.locGeo.lng+",13z" : ""}`;
  // Generate curated result cards linking to Maps
  const results = generateResults(cat, S.locCity || "your area");
  set({locResults: results, locLoading:false});
}

function generateResults(cat, city){
  // Creates search-link cards that open Google Maps
  const baseQ = encodeURIComponent(cat.q + " " + city);
  const mapsBase = `https://www.google.com/maps/search/${encodeURIComponent(cat.q + " " + city)}`;
  return [
    {
      id:1,
      name: `${cat.name} near ${city}`,
      type: cat.name,
      icon: cat.icon,
      desc: `Tap below to find ${cat.desc.toLowerCase()} near ${city} on Google Maps.`,
      badges:["Veteran Friendly","Military Discount"],
      mapsUrl: mapsBase,
      searchUrl: `https://www.google.com/search?q=${baseQ}`,
      isSearch: true
    },
    {
      id:2,
      name:`VA Locator — Official VA Facilities`,
      type:"VA Official",
      icon:"🏛️",
      desc:`Find official VA health facilities, Vet Centers, and benefits offices near ${city}.`,
      badges:["Official VA","Free Services"],
      mapsUrl:`https://www.va.gov/find-locations/?facilityType=health&serviceType=&lat=&lng=&context=${encodeURIComponent(city)}&address=${encodeURIComponent(city)}&radius=75`,
      searchUrl:`https://www.va.gov/find-locations/`,
      isVA: true
    },
    {
      id:3,
      name:`Yelp — Military & Veteran Businesses`,
      type:"Community Reviews",
      icon:"⭐",
      desc:`Browse community-reviewed military-friendly businesses in ${city} on Yelp.`,
      badges:["Community Rated"],
      mapsUrl:`https://www.yelp.com/search?find_desc=${encodeURIComponent(cat.q)}&find_loc=${encodeURIComponent(city)}`,
      searchUrl:`https://www.yelp.com/search?find_desc=${encodeURIComponent(cat.q)}&find_loc=${encodeURIComponent(city)}`,
      isYelp: true
    }
  ];
}

          <div class="mp-success-sub">Your free guide is ready. Tap below to download it now. We'll also send new benefits, discounts, and updates straight to your inbox.</div>
          <a class="mp-dl-btn" href="https://mymilperks.com/MilPerks_Top10Perks.pdf" download target="_blank">Download Free PDF Guide</a>
          <div style="margin-top:8px">
            <button class="mp-skip" onclick="mpClose()">Continue to MilPerks</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) mpClose();
  });

  // Show after 2 second delay
  overlay.style.display = 'none';
  setTimeout(function(){
    overlay.style.display = 'flex';
  }, 2000);

  window.mpValidate = function(){
    const email = document.getElementById('mp-email').value;
    const btn = document.getElementById('mp-submit');
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    btn.disabled = !valid;
  };

  window.mpSubmit = function(){
    const email = document.getElementById('mp-email').value;
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;

    const btn = document.getElementById('mp-submit');
    btn.disabled = true;
    btn.textContent = 'SENDING...';

    // ── CALL VERCEL SERVERLESS FUNCTION ───────────────────────────────
    fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      localStorage.setItem('mp_email_done', email);
      localStorage.setItem('mp_email_date', Date.now());
      document.getElementById('mp-form-view').style.display = 'none';
      document.getElementById('mp-success-view').style.display = 'block';
    })
    .catch(function(){
      // Fallback — show success even if network fails
      localStorage.setItem('mp_email_done', email);
      document.getElementById('mp-form-view').style.display = 'none';
      document.getElementById('mp-success-view').style.display = 'block';
    });
  };

  window.mpClose = function(){
    const overlay = document.getElementById('mp-overlay');
    if(overlay) {
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.2s';
      setTimeout(function(){ overlay.remove(); }, 200);
    }
    if(!localStorage.getItem('mp_email_done')){
      localStorage.setItem('mp_popup_dismissed', Date.now());
    }
  };
})();
</script></body></html>
